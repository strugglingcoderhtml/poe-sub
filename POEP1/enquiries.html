<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooted 4 U | Enquiries</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🌿 Enquiries</h1>

    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="services.html">Services</a> |
        <a href="contact.html">Contact</a> |
        <a href="enquiries.html">Enquiries</a>
    </nav>
</header>

<main>
    <div class="bubble-one">

        <h2>Book a Consultation or Ask a Question</h2>

        <form id="enquiryForm" method="post">

            <label for="name">Full Name</label><br>
            <input 
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                autocomplete="name"
                required>
            <br><br>

            <label for="email">Email</label><br>
            <input 
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                autocomplete="email"
                required>
            <br><br>

            <label for="service">Service Interested In</label><br>
            <input 
                type="text"
                id="service"
                name="service"
                placeholder="Hair treatment, consultation, etc."
                autocomplete="off"
                required>
            <br><br>

            <label for="message">Your Message</label><br>
            <textarea 
                id="message"
                name="message"
                placeholder="Type your message here"
                maxlength="500"
                required></textarea>
            <br><br>

            <input type="submit" value="Submit Enquiry">

            <!-- JavaScript displays errors or success here -->
            <p id="responseMessage"></p>

        </form>

    </div>
</main>

<hr>

<footer>
    <p>🌿 Rooted 4 U Original</p>
</footer>

<!-- JavaScript File -->
<script src="js/script.js"></script>

</body>
</html>
